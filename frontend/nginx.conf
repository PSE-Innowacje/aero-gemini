# Nginx only serves the static Vite build (SPA).
# Reverse proxy, TLS, and certbot live in your edge stack (separate repo / host nginx).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
