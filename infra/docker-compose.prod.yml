# Application stack: backend + static frontend (nginx serves SPA only, no /api proxy).
# Edge nginx + certbot live in a separate repository; attach both stacks to the same
# external Docker network (default name: internal-proxy).
#
# No host port publishing — reachable only from containers on that network, e.g.:
#   http://aero-web:8080     — frontend (unprivileged nginx)
#   http://aero-backend:8000 — API (FastAPI /api prefix)
#
# Create the network once (shared with your edge / reverse-proxy compose):
#   docker network create internal-proxy
#
# From repo root:
#   docker compose -p aero-prod --env-file infra/.env -f infra/docker-compose.prod.yml up -d --build

name: aero-prod

services:
  aero-backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: production
    container_name: aero-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - backend_data:/app/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Entrypoint runs as root: chown on /app/data + runuser to appuser need these after cap_drop ALL.
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m
    networks:
      - edge

  aero-web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: aero-web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=32m
      - /var/cache/nginx:noexec,nosuid,nodev,size=32m
      - /var/run:noexec,nosuid,nodev,size=16m
      - /var/log/nginx:noexec,nosuid,nodev,size=8m
    networks:
      - edge

networks:
  edge:
    name: internal-proxy
    external: true

volumes:
  backend_data:
